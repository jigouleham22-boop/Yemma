<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Joyeux anniversaire maman</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
color:white;
}

/* grand texte */
.title{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:pink;
text-shadow:0 0 20px red,0 0 40px pink;
text-align:center;
}

/* petits messages */
.message{
position:absolute;
color:#00ffff;
font-size:25px;
animation:float 8s linear infinite;
}

/* animation */
@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

/* coeur */
.heart{
position:absolute;
color:red;
font-size:30px;
animation:heartMove 6s linear infinite;
}

@keyframes heartMove{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-100vh) scale(1.2);
opacity:0;
}

}

</style>
</head>

<body>

<div class="title">
🎂 Joyeux Anniversaire Maman ❤️
<br>
laqouv ar 100 ans nchlh 🤲🤲
</div>

<script>

/* messages */
const messages = [

"🎂 Joyeux anniversaire ma maman ❤️",
"Joyeux anniversaire ma maman adorée",
"Maman, tu es le cœur de notre famille",
"Merci pour tout ton amour maman",
"Tu es notre force et notre lumière",
"Que Dieu te protège maman",
"La meilleure maman du monde",
"Maman, tu es notre bonheur",
"Sans toi la maison n'est pas la même",
"Tu es la reine de notre famille 👑",
"Merci pour tous tes sacrifices",
"Maman, ton amour est éternel",
"Tu es notre fierté et notre sécurité",
"Je t'aime maman ❤️"
];

/* créer message */
function createMessage(){
let msg=document.createElement("div");
msg.className="message";

msg.innerText=messages[Math.floor(Math.random()*messages.length)];

msg.style.left=Math.random()*100+"vw";
msg.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(msg);

setTimeout(()=>{msg.remove();},8000);
}

/* créer coeur */
function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);
}

/* répétition */
setInterval(createMessage,900);
setInterval(createHeart,500);

</script>

</body>

</html>
